name: Build unsigned Renlyst IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - Renlyst.ipa

permissions:
  contents: read

jobs:
  test:
    name: Run simulator tests
    runs-on: macos-15-intel
    timeout-minutes: 40

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Run unit and UI tests
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available -j | python3 -c 'import json, sys; devices = json.load(sys.stdin)["devices"]; print(next(device["udid"] for runtime, items in devices.items() if runtime.endswith("iOS-18-5") for device in items if device["name"] == "iPhone 16" and device["isAvailable"]))')"
          xcrun simctl boot "$SIMULATOR_ID" || true
          xcrun simctl bootstatus "$SIMULATOR_ID" -b
          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -destination-timeout 120 \
            -derivedDataPath build/TestDerivedData \
            test

  build:
    name: Build IPA for Windows sideloading
    needs: test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build unsigned iPhone application
        run: |
          set -euo pipefail
          rm -rf build Payload Renlyst.ipa

          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            DEVELOPMENT_TEAM='' \
            clean build

          APP_PATH='build/DerivedData/Build/Products/Release-iphoneos/Renlyst.app'
          test -d "$APP_PATH"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")" = 'com.renlyst.app'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")" = '1.6.0'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")" = '6'
          mkdir Payload
          ditto "$APP_PATH" 'Payload/Renlyst.app'
          /usr/bin/zip -qry Renlyst.ipa Payload
          test -s Renlyst.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: Renlyst-unsigned-IPA
          path: Renlyst.ipa
          if-no-files-found: error
          retention-days: 7
