name: Build unsigned PharmaShift IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - PharmaShift.ipa

permissions:
  contents: read

jobs:
  test:
    name: Run simulator tests
    runs-on: macos-15-intel
    timeout-minutes: 20

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Run unit and UI tests
        run: |
          set -euo pipefail
          xcrun simctl list devices available
          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath build/TestDerivedData \
            test

  build:
    name: Build IPA for Windows sideloading
    needs: test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build unsigned iPhone application
        run: |
          set -euo pipefail
          rm -rf build Payload PharmaShift.ipa

          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            DEVELOPMENT_TEAM='' \
            clean build

          APP_PATH='build/DerivedData/Build/Products/Release-iphoneos/PharmaShift.app'
          test -d "$APP_PATH"
          mkdir Payload
          ditto "$APP_PATH" 'Payload/PharmaShift.app'
          /usr/bin/zip -qry PharmaShift.ipa Payload
          test -s PharmaShift.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: PharmaShift-unsigned-IPA
          path: PharmaShift.ipa
          if-no-files-found: error
          retention-days: 7
