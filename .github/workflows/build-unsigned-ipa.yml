name: Build unsigned Renlyst IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - Renlyst.ipa

permissions:
  contents: read

jobs:
  test:
    name: Run unit tests
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Select an available iPhone simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          test -n "$SIMULATOR_ID"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Run unit test suite
        run: |
          set -euo pipefail
          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath build/TestDerivedData \
            -only-testing:PharmaShiftTests \
            test

  ui-test:
    name: UI · ${{ matrix.test }}
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        test:
          - testHomeDashboardAndFastCaptureAreReachable
          - testFivePageDrugCardNavigatesThroughLearnAndSafety
          - testStandaloneAIGeneratorReachesFieldReviewWithoutSourceStep
          - testPhotoLibraryButtonPresentsLibraryInsteadOfCamera
          - testBackupAndDataFlowIsReachable
          - testDeepSeekSaveDoesNotAlsoClearAndPersistsAcrossRelaunch
          - testTrustedImportReachesSourceChooser
          - testGeneratedPreviewAllowsSelectiveFields
          - testFocusModeShowsOneActionAndPracticeHasFiveQuestionProgress

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Select an available iPhone simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          test -n "$SIMULATOR_ID"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Run UI journey
        run: |
          set -euo pipefail
          run_ui_test() {
            xcodebuild \
              -project PharmaShift.xcodeproj \
              -scheme PharmaShift \
              -configuration Debug \
              -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
              -derivedDataPath build/UITestDerivedData \
              -only-testing:PharmaShiftUITests/PharmaShiftUITests/${{ matrix.test }} \
              test
          }
          if ! run_ui_test; then
            echo "First UI attempt failed; rebooting the simulator and retrying once."
            xcrun simctl shutdown "$SIMULATOR_ID" || true
            xcrun simctl boot "$SIMULATOR_ID"
            xcrun simctl bootstatus "$SIMULATOR_ID" -b
            run_ui_test
          fi

  build:
    name: Build IPA for Windows sideloading
    needs: [test, ui-test]
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build unsigned iPhone application
        run: |
          set -euo pipefail
          rm -rf build Payload Renlyst.ipa

          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            DEVELOPMENT_TEAM='' \
            clean build

          APP_PATH='build/DerivedData/Build/Products/Release-iphoneos/Renlyst.app'
          test -d "$APP_PATH"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")" = 'com.renlyst.app'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")" = '1.7.0'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")" = '11'
          mkdir Payload
          ditto "$APP_PATH" 'Payload/Renlyst.app'
          /usr/bin/zip -qry Renlyst.ipa Payload
          test -s Renlyst.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: Renlyst-unsigned-IPA
          path: Renlyst.ipa
          if-no-files-found: error
          retention-days: 7
