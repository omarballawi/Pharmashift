name: Build unsigned Renlyst IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths-ignore:
      - Renlyst.ipa

permissions:
  contents: write

concurrency:
  group: unsigned-ipa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run unit tests
    if: github.event_name != 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Select an available iPhone simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          test -n "$SIMULATOR_ID"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Run unit test suite
        run: |
          set -euo pipefail
          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -derivedDataPath build/TestDerivedData \
            -only-testing:PharmaShiftTests \
            test

  ui-test:
    if: github.event_name != 'workflow_dispatch'
    name: UI · ${{ matrix.test }}
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        test:
          - testHomeDashboardAndFastCaptureAreReachable
          - testOnePageDrugProfileExpandsPharmacologyAndSafety
          - testEveryDrugTopicPushesOnceAndOneBackReturnsToOverview
          - testStandaloneAIGeneratorReachesFieldReviewWithoutSourceStep
          - testPhotoLibraryButtonPresentsLibraryInsteadOfCamera
          - testBackupAndDataFlowIsReachable
          - testDeepSeekSaveDoesNotAlsoClearAndPersistsAcrossRelaunch
          - testTrustedImportReachesSourceChooser
          - testGeneratedPreviewAllowsSelectiveFields
          - testFocusModeShowsOneActionAndPracticeHasFiveQuestionProgress
          - testManualBrandAndDeletionControlsAreReachable

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Select an available iPhone simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          test -n "$SIMULATOR_ID"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Run UI journey
        run: |
          set -euo pipefail
          run_ui_test() {
            xcodebuild \
              -project PharmaShift.xcodeproj \
              -scheme PharmaShift \
              -configuration Debug \
              -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
              -derivedDataPath build/UITestDerivedData \
              -only-testing:PharmaShiftUITests/PharmaShiftUITests/${{ matrix.test }} \
              test
          }
          if ! run_ui_test; then
            echo "First UI attempt failed; rebooting the simulator and retrying once."
            xcrun simctl shutdown "$SIMULATOR_ID" || true
            xcrun simctl boot "$SIMULATOR_ID"
            xcrun simctl bootstatus "$SIMULATOR_ID" -b
            run_ui_test
          fi

  build:
    name: Build IPA for Windows sideloading
    needs: [test, ui-test]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || (needs.test.result == 'success' && needs.ui-test.result == 'success')) }}
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out project
        uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build unsigned iPhone application
        run: |
          set -euo pipefail
          rm -rf build Payload Renlyst.ipa

          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            DEVELOPMENT_TEAM='' \
            clean build

          APP_PATH='build/DerivedData/Build/Products/Release-iphoneos/Renlyst.app'
          test -d "$APP_PATH"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")" = 'com.renlyst.app'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")" = '2.1.0'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")" = '19'
          mkdir Payload
          ditto "$APP_PATH" 'Payload/Renlyst.app'
          /usr/bin/zip -qry Renlyst.ipa Payload
          test -s Renlyst.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: Renlyst-unsigned-IPA
          path: Renlyst.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Publish Renlyst 2.1 release
        if: github.ref == 'refs/heads/codex/renlyst-2-rebuild'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view v2.1.0 >/dev/null 2>&1; then
            gh release upload v2.1.0 Renlyst.ipa --clobber
          else
            gh release create v2.1.0 Renlyst.ipa \
              --target "$GITHUB_SHA" \
              --title "Renlyst 2.1" \
              --notes "Navigation and performance rebuild, three memory anchors, verified active-recall questions, manual brand and profile deletion workflows, cohesive native UI, and purposeful motion. The IPA is unsigned for sideloading."
          fi
