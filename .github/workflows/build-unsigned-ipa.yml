name: Build unsigned PharmaShift IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build IPA for Windows sideloading
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build unsigned iPhone application
        run: |
          set -euo pipefail
          rm -rf build Payload PharmaShift.ipa

          xcodebuild \
            -project PharmaShift.xcodeproj \
            -scheme PharmaShift \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            DEVELOPMENT_TEAM='' \
            clean build

          APP_PATH='build/DerivedData/Build/Products/Release-iphoneos/PharmaShift.app'
          test -d "$APP_PATH"
          mkdir Payload
          ditto "$APP_PATH" 'Payload/PharmaShift.app'
          /usr/bin/zip -qry PharmaShift.ipa Payload
          test -s PharmaShift.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PharmaShift-unsigned-IPA
          path: PharmaShift.ipa
          if-no-files-found: error
          retention-days: 7
